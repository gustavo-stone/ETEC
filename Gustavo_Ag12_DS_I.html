<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meus sites favoritos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 150px;
            height: 150px;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

    <!-- Título da página -->
    <h1>Meus sites favoritos: Seu Nome</h1>

    <div class="container">

        <!-- Site 1 -->
        <div class="card">
            <h2>YouTube</h2>
            <a href="https://www.youtube.com" target="_blank">
                <img src="youtube.png" alt="YouTube">
            </a>
            <p><a href="https://www.youtube.com" target="_blank">Acessar</a></p>
        </div>

        <!-- Site 2 -->
        <div class="card">
            <h2>Google</h2>
            <a href="https://www.google.com" target="_blank">
                <img src="google.png" alt="Google">
            </a>
            <p><a href="https://www.google.com" target="_blank">Acessar</a></p>
        </div>

        <!-- Site 3 -->
        <div class="card">
            <h2>GitHub</h2>
            <a href="https://github.com" target="_blank">
                <img src="github.png" alt="GitHub">
            </a>
            <p><a href="https://github.com" target="_blank">Acessar</a></p>
        </div>

        <!-- Site 4 -->
        <div class="card">
            <h2>Stack Overflow</h2>
            <a href="https://stackoverflow.com" target="_blank">
                <img src="stack.png" alt="Stack Overflow">
            </a>
            <p><a href="https://stackoverflow.com" target="_blank">Acessar</a></p>
        </div>

        <!-- Site 5 -->
        <div class="card">
            <h2>Netflix</h2>
            <a href="https://www.netflix.com" target="_blank">
                <img src="netflix.png" alt="Netflix">
            </a>
            <p><a href="https://www.netflix.com" target="_blank">Acessar</a></p>
        </div>

    </div>

</body>
</html>
